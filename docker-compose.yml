version: '3.9'

services:

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - frontend
    depends_on:
      - udp-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: infraestructura
    ports:
      - "${MYSQL_PORT}:3306"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

  udp-service:
    build: ./udp-service
    container_name: udp_service
    ports:
      - "${UDP_PORT}:5000/udp"
    networks:
      - backend
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  asterisk:
    image: andrius/asterisk
    container_name: asterisk_voip
    ports:
      - "5060:5060/udp"
      - "10000-20000:10000-20000/udp"
    networks:
      - voip
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  frontend:
  backend:
  voip:
